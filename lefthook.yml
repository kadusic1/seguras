pre-commit:
  parallel: true
  commands:
    format:
      run: cd frontend && bunx biome check --write --no-errors-on-unmatched --staged && git -C .. add {staged_files}
      glob: "**/*.{js,ts,jsx,tsx,json,md}"
    type-check:
      run: cd frontend && bun run type-check
    golangci-lint:
      dir: backend
      run: golangci-lint run ./...
      glob: "*.go"
