name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

defaults:
  run:
    working-directory: frontend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x
      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: modules-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: modules-
      - run: bun install --frozen-lockfile
      - run: bunx biome check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x
      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: modules-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: modules-
      - run: bun install --frozen-lockfile
      - run: bun run type-check

  build:
    needs: [lint, type-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x
      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: modules-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: modules-
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: next-${{ hashFiles('frontend/package.json', 'frontend/next.config.ts') }}
      - run: bun install --frozen-lockfile
      - run: bun run build
